<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel | Cake Crumbs</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  
  <script src="scripts.js"></script>
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">Cake Crumbs</div>
      <div id="greeting"></div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="cakes.html">Our Cakes</a></li>
        <li><a href="account.html">Account</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
    </nav>
  </header>

  <main id="adminContent" style="display:none; align-items: center; width: 100%;">
    
    <div class="cakes-page-header">
      <h1>Manage Orders</h1>
      <div class="search-filter">
        <input type="text" id="adminSearch" placeholder="Search name or ID..." onkeyup="filterOrders()" style="max-width: 250px;">
      </div>
    </div>

    <div class="admin-grid">
      <table class="cute-table">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Items</th>
            <th>Total Paid</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="adminOrdersTable">
          </tbody>
      </table>
    </div>
  </main>

  <div id="accessDenied" style="display:none; text-align:center; margin-top:150px; width: 100%;">
    <h1>Access Denied</h1>
    <p style="color: #8c7a7d; margin-bottom: 20px;">You do not have permission to view this page.</p>
    <a href="index.html" style="color: #ff8fab; font-weight: bold; text-decoration: none;">Return Home</a>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDRH-thAW1SjOyCQlrOlUQCGBVRua8jLxU",
      authDomain: "cakecrumbs-d1290.firebaseapp.com",
      projectId: "cakecrumbs-d1290",
      storageBucket: "cakecrumbs-d1290.appspot.com",
      messagingSenderId: "543242101407",
      appId: "1:543242101407:web:d6dd372813b0f5a4ae38aa",
    };
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    firebase.auth().onAuthStateChanged((user) => {
      if (user) {
        db.collection('users').doc(user.uid).get().then((doc) => {
          if (doc.exists && doc.data().role === 'admin') {
            document.getElementById('adminContent').style.display = 'flex';
            document.getElementById('adminContent').style.flexDirection = 'column';
            loadAllOrders();
          } else {
            document.getElementById('accessDenied').style.display = 'block';
          }
        });
      } else {
        window.location.href = 'account.html';
      }
    });

    function loadAllOrders() {
      const tableBody = document.getElementById('adminOrdersTable');
      
      db.collection('orders').orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
        tableBody.innerHTML = '';
        
        snapshot.forEach((doc) => {
          const order = doc.data();
          const id = doc.id;        
          const row = document.createElement('tr');          
          const cssStatus = (order.status || 'pending').replace(/\s+/g, '').toLowerCase();

          row.innerHTML = `
            <td><strong>#${id.substring(0,6)}</strong></td>
            <td id="customer-${id}">Loading...</td>
            <td>${order.items ? order.items.length : 0} items</td>
            <td style="font-weight: bold; color: #ff8fab;">${order.total || '$0.00'}</td>
            <td><span class="status-badge status-${cssStatus}">${order.status || 'Pending'}</span></td>
            <td>
              <select onchange="updateStatus('${id}', this.value)">
                <option value="Pending" ${order.status === 'Pending' ? 'selected' : ''}>Pending</option>
                <option value="Baking" ${order.status === 'Baking' ? 'selected' : ''}>Baking</option>
                <option value="Completed" ${order.status === 'Completed' ? 'selected' : ''}>Completed</option>
                <option value="Picked Up" ${order.status === 'Picked Up' ? 'selected' : ''}>Picked Up</option>
              </select>
            </td>
          `;
          tableBody.appendChild(row);

          db.collection('users').doc(order.userId).get().then((userDoc) => {
             const name = userDoc.exists ? userDoc.data().name : "Unknown Customer";
             document.getElementById(`customer-${id}`).innerHTML = `
                <strong>${name}</strong> <br>
                <button 
                  onclick="copyToClipboard('${order.userId}', this)" 
                  style="margin-top: 5px; background: #ffe5ec; color: #5c4a4d; border: none; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; cursor: pointer; box-shadow: none; transition: background 0.3s;">
                  Copy ID
                </button>
             `;
          });
        });
      });
    }

    function updateStatus(orderId, newStatus) {
      db.collection('orders').doc(orderId).update({ status: newStatus })
        .then(() => console.log("Status updated to " + newStatus))
        .catch(err => alert("Failed to update status: " + err.message));
    }

    function copyToClipboard(text, btnElement) {
        navigator.clipboard.writeText(text).then(() => {
            btnElement.innerText = "Copied!";
            btnElement.style.background = "#d4edda";
            btnElement.style.color = "#155724";
            
            setTimeout(() => {
                btnElement.innerText = "Copy ID";
                btnElement.style.background = "#ffe5ec";
                btnElement.style.color = "#5c4a4d";
            }, 2000);
        }).catch(err => {
            console.error("Copy failed: ", err);
            alert("Your browser blocked the copy action.");
        });
    }

    function filterOrders() {
        const searchInput = document.getElementById('adminSearch').value.toLowerCase();
        const table = document.getElementById('adminOrdersTable');
        const rows = table.getElementsByTagName('tr');

        for (let i = 0; i < rows.length; i++) {
            const rowText = rows[i].textContent.toLowerCase();
            
            if (rowText.includes(searchInput)) {
                rows[i].style.display = '';
            } else {
                rows[i].style.display = 'none'; 
            }
        }
    }
  </script>
</body>
</html>
