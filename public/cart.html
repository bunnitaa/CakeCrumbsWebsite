<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Cake Crumbs</title>
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  
  <script>
    if (!firebase.apps.length) {
      firebase.initializeApp(FIREBASE_CONFIG);
    }
  </script>
  <script src="scripts.js"></script>

  <script src="https://www.paypal.com/sdk/js?client-id=AQ5r7CzW3ls1kJDYqy8P6CfKuFsepLrn6cYkyhJQmdZwcfFz6DOzBgleJ_ka5L6F33rUeHIdSy3HyoQR&currency=CAD"></script>
</head>
<body>
  
  <header>
    <nav class="navbar">
      <div class="logo">Cake Crumbs</div>
      <div id="greeting"></div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="cakes.html">Our Cakes</a></li>
        <li><a href="account.html">Account</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="cart-wrapper">
      <div id="cartItemsContainer" class="cart-items-list">
        <p>Loading your delicious cakes...</p>
      </div>

      <div class="cart-summary-card">
        <h3>Order Summary</h3>
        <hr>
        <div class="summary-row">
          <span>Subtotal (<span id="totalItems">0</span> items):</span>
          <span id="cartSubtotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>GST (5%):</span>
          <span id="gstTotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>QST (9.975%):</span>
          <span id="qstTotal">$0.00</span>
        </div>
        <div class="summary-row total-price">
          <span>Grand Total:</span>
          <span id="cartTotal">$0.00</span>
        </div>
        
        <div id="paypal-button-container" style="margin-top: 20px;"></div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2024 Cake Crumbs | All Rights Reserved</p>
  </footer>

  <script>
    const db = firebase.firestore();
    const auth = firebase.auth();
    let currentCartTotal = "0.00";

    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'account.html';
      } else {
        loadCartItems(user.uid);
        renderPayPalButtons(user);
      }
    });

    function loadCartItems(userId) {
      const container = document.getElementById('cartItemsContainer');
      const subtotalDisplay = document.getElementById('cartSubtotal');
      const gstDisplay = document.getElementById('gstTotal');
      const qstDisplay = document.getElementById('qstTotal');
      const totalDisplay = document.getElementById('cartTotal');
      const countDisplay = document.getElementById('totalItems');

      db.collection("carts").doc(userId).onSnapshot((doc) => {
        container.innerHTML = '';
        let subtotal = 0;

        if (doc.exists && doc.data().cakes && doc.data().cakes.length > 0) {
          const cakes = doc.data().cakes;

          cakes.forEach((item, index) => {
            const price = parseFloat(item.price) || 0;
            subtotal += price;

            const itemElement = document.createElement('div');
            itemElement.className = 'cart-item-card';
            
            itemElement.innerHTML = `
              <img src="${item.image || ''}" alt="${item.name}" class="cart-item-image">
              <div class="cart-item-details">
                <h4>${item.name}</h4>
                <p class="cart-item-price">$${price.toFixed(2)}</p>
              </div>
              <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
            `;
            container.appendChild(itemElement);
          });

          const gst = subtotal * 0.05;
          const qst = subtotal * 0.09975;
          const grandTotal = subtotal + gst + qst;

          currentCartTotal = grandTotal.toFixed(2);

          subtotalDisplay.innerText = `$${subtotal.toFixed(2)}`;
          gstDisplay.innerText = `$${gst.toFixed(2)}`;
          qstDisplay.innerText = `$${qst.toFixed(2)}`;
          totalDisplay.innerText = `$${grandTotal.toFixed(2)}`;
          countDisplay.innerText = cakes.length;

        } else {
          container.innerHTML = '<p>Your cart is empty!</p>';
          subtotalDisplay.innerText = '$0.00';
          gstDisplay.innerText = '$0.00';
          qstDisplay.innerText = '$0.00';
          totalDisplay.innerText = '$0.00';
          countDisplay.innerText = '0';
          currentCartTotal = "0.00";
        }
      });
    }

    function renderPayPalButtons(user) {
      document.getElementById('paypal-button-container').innerHTML = '';
      
      paypal.Buttons({
        createOrder: function(data, actions) {
          if (parseFloat(currentCartTotal) <= 0) {
            alert("Please add items to your cart first.");
            return;
          }
          return actions.order.create({
            purchase_units: [{
              amount: {
                value: currentCartTotal
              }
            }]
          });
        },
        onApprove: function(data, actions) {
          return actions.order.capture().then(function(details) {
            const cartRef = db.collection('carts').doc(user.uid);
            
            return cartRef.get().then((doc) => {
              const items = doc.data().cakes;
              
              return db.collection("orders").add({
                userId: user.uid,
                items: items,
                total: "$" + currentCartTotal,
                status: "Paid - Preparing",
                paypalOrderId: data.orderID,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
              });
            }).then((orderDoc) => {
              return cartRef.update({ cakes: [] }).then(() => orderDoc);
            }).then((orderDoc) => {
              window.location.href = `success.html?id=${orderDoc.id}`;
            });
          });
        },
        onError: function(err) {
          console.error("PayPal Error: ", err);
          alert("Payment could not be processed. Please try again.");
        }
      }).render('#paypal-button-container');
    }

    function removeItem(index) {
      const user = auth.currentUser;
      const cartRef = db.collection('carts').doc(user.uid);

      cartRef.get().then((doc) => {
        const cakes = doc.data().cakes;
        const itemToRemove = cakes[index];
        return cartRef.update({
          cakes: firebase.firestore.FieldValue.arrayRemove(itemToRemove)
        });
      }).catch(err => console.error("Error removing item:", err));
    }
  </script>
</body>
</html>
